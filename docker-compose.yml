version: "3.8"

services:

  # ================= DATABASE =================
  mysql:
    image: mysql:8.0
    container_name: evp-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: video_platform
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - evp-network

  # ================= CACHE =================
  redis:
    image: redis:7
    container_name: evp-redis
    ports:
      - "6379:6379"
    networks:
      - evp-network

  # ================= KAFKA =================
  zookeeper:
    image: confluentinc/cp-zookeeper:latest
    container_name: evp-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    networks:
      - evp-network

  kafka:
    image: confluentinc/cp-kafka:latest
    container_name: evp-kafka  # <--- This was missing 2 spaces of indentation
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    networks:
      - evp-network

  # ================= STORAGE =================
  minio:
    image: minio/minio
    container_name: evp-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: password
    ports:
      - "9000:9000"
      - "9001:9001"
    networks:
      - evp-network

  # ================= SEARCH =================
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
    container_name: evp-elasticsearch
    environment:
      - discovery.type=single-node
    ports:
      - "9200:9200"
    networks:
      - evp-network

  # ================= AUTH SERVICE =================
  auth-service:
    build: ./apps/auth-service
    container_name: evp-auth
    ports:
      - "4001:4001"
    env_file:
      - ./apps/auth-service/.env
    depends_on:
      - kafka
    restart: always
    environment:
      KAFKA_BROKER: kafka:9092
    networks:
      - evp-network

  # ================= GATEWAY =================
  gateway:
    build: ./apps/gateway
    container_name: evp-gateway
    ports:
      - "4000:4000"
    depends_on:
      - auth-service
    restart: always
    networks:
      - evp-network

volumes:
  mysql_data:

networks:
  evp-network:
    driver: bridge